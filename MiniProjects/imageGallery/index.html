<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="flex justify-between items-center bg-sky-300 text-xl w-screen h-10 px-4">
        <h1 class="font-bold">Image Gallery</h1>
        <div class="flex gap-5">
            <a href="#">Images</a>
            <a href="#">Vector</a>
            <a href="#">Icons</a>
            <a href="#">About</a>
        </div>
    </nav>

    <!-- Content -->
    <div class="bg-cyan-100 min-h-screen p-4">

        <!-- Search -->
        <div class="flex gap-2 mb-4">
            <input type="text" placeholder="Search"
                class="border-2 px-3 py-1 rounded outline-none">
            <button class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-700">
                Search
            </button>
        </div>

        <!-- Image Grid -->
        <div class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-5 border-2">
            <img src="https://tse4.mm.bing.net/th/id/OIP.JPogPMSOOv8g9WJdtLUluAHaEe?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">

            <img src="https://tse1.mm.bing.net/th/id/OIP.zB1rsS80G2GPbY0mMvKnigHaEK?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">

            <img src="https://tse2.mm.bing.net/th/id/OIP.G37tgeQqSNt7v2oPfj9ltQHaE7?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">

            <img src="https://tse4.mm.bing.net/th/id/OIP.hJvD9S8jNngQQyz9NmNwQAHaE6?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">

            <img src="https://tse3.mm.bing.net/th/id/OIP.bRsabhbKdqz1NjnTjU8pYQHaEJ?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">

            <img src="https://tse2.mm.bing.net/th/id/OIP.e6voHjED4omwbyU6TqoCmwHaE8?pid=Api&P=0&h=180"
                 class="w-full h-40 object-cover rounded">
        </div>

    </div>

</body>
</html>
